<ion-content [fullscreen]="true">

  @if (scanning()) {
    <!-- Everything here shows OVER the camera feed -->
    <div class="scanner-ui">

      <!-- Top bar: count + last scanned -->
      <div class="scan-status">
        <div class="scan-count">
          {{ assetsStore.assets().length }} scanned
        </div>

        @if (lastScanned()) {
          <div class="last-scanned">
            {{ lastScanned() }}
          </div>
        }
      </div>

      <!-- The reticle -->
      <div class="reticle"></div>

      <!-- Warning area: duplicate (amber) or error (red) -->
      @if (warning()) {
        <div class="warning" [class.warning-duplicate]="warningType() === 'duplicate'"
                             [class.warning-error]="warningType() === 'error'">
          {{ warning() }}
        </div>
      }

      <!-- Done. Deliberately no color="light": that resolves to #1e1e20 in
           dark mode, which is invisible against a dim room. The overlay pins
           its own palette-independent colours instead. -->
      <ion-button class="done-button" (click)="done()" expand="block">
        Done
      </ion-button>

    </div>
  }

  @else if (permissionDenied()) {
    <div class="pau-state">
      <div class="pau-state__icon">
        <ion-icon name="camera-outline" aria-hidden="true"></ion-icon>
      </div>
      <div class="pau-state__text">
        <ion-text>
          <h2 class="pau-state__title">Camera permission needed</h2>
          <p class="pau-state__body">Sweep Ledger needs camera access to scan barcodes.</p>
        </ion-text>
      </div>
      <div class="pau-state__actions">
        <ion-button class="pau-cta" expand="block" (click)="startScanning()">Try again</ion-button>
        <ion-button fill="clear" (click)="done()">Back to sweep</ion-button>
      </div>
    </div>
  }

  @else {
    <!-- Scanner not running and not a permission problem — transient/error fallback -->
    <div class="pau-state">
      <ion-spinner name="circular"></ion-spinner>
    </div>
  }

</ion-content>
