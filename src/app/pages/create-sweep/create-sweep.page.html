<ion-header>
  <ion-toolbar>
    <ion-title>New Sweep</ion-title>
    <ion-buttons slot="start">
      <ion-button (click)="cancel()">Cancel</ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content>
  <div class="modal-shell">
    <form [formGroup]="form" class="modal-form">
      <div class="pau-field">
        <ion-icon name="business-outline" class="field-icon" aria-hidden="true"></ion-icon>
        <input
          class="field-input"
          type="text"
          formControlName="roomCode"
          placeholder="Room code (e.g. A204)"
          aria-label="Room code" />
      </div>

      <div class="pau-field">
        <ion-icon name="person-outline" class="field-icon" aria-hidden="true"></ion-icon>
        <input
          class="field-input"
          type="text"
          formControlName="responsiblePersonName"
          placeholder="Responsible person"
          aria-label="Responsible person" />
      </div>
    </form>

    @if (errorMsg()) {
      <div class="pau-notice pau-notice--error" role="alert">
        <ion-icon name="alert-circle-outline" aria-hidden="true"></ion-icon>
        <ion-text color="danger">
          <p class="error-text">{{ errorMsg() }}</p>
        </ion-text>
      </div>
    }

    <ion-button
      class="pau-cta"
      expand="block"
      [strong]="true"
      (click)="submit()"
      [disabled]="form.invalid || saving()">
      @if (saving()) { <ion-spinner name="circular"></ion-spinner> }
      @else { Create sweep }
    </ion-button>
  </div>
</ion-content>
