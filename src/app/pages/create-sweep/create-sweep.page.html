<ion-header>
  <ion-toolbar>
    <ion-title>New Sweep</ion-title>
    <ion-buttons slot="start">
      <ion-button (click)="cancel()">Cancel</ion-button>
    </ion-buttons>
    <ion-buttons slot="end">
      <ion-button [strong]="true" (click)="submit()" [disabled]="form.invalid || saving()">
        Create
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content>
  <form [formGroup]="form">
    <ion-list>
      <ion-item>
        <ion-input
          label="Room code"
          labelPlacement="floating"
          formControlName="roomCode"
          placeholder="e.g. A204">
        </ion-input>
      </ion-item>
      <ion-item>
        <ion-input
          label="Responsible person"
          labelPlacement="floating"
          formControlName="responsiblePersonName">
        </ion-input>
      </ion-item>
    </ion-list>
  </form>
  
</ion-content>
