<ion-header>
  <ion-toolbar>
    <ion-title>New User</ion-title>
    <ion-buttons slot="start">
      <ion-button (click)="cancel()">Cancel</ion-button>
    </ion-buttons>
    <ion-buttons slot="end">
      <ion-button [strong]="true" (click)="submit()" [disabled]="form.invalid || saving()">
        Create
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content>
  <form [formGroup]="form">
    <ion-list>
      <ion-item>
        <ion-input
          label="Name"
          labelPlacement="floating"
          formControlName="name">
        </ion-input>
      </ion-item>
      <ion-item>
        <ion-input
          label="Username"
          labelPlacement="floating"
          formControlName="username">
        </ion-input>
      </ion-item>
      <ion-item>
        <ion-input
          label="Password"
          labelPlacement="floating"
          formControlName="password">
        </ion-input>
      </ion-item>
    </ion-list>
  </form>

  @if (errorMsg()) {
    <ion-text color="danger">
      <p class="error-text">{{ errorMsg() }}</p>
    </ion-text>
  }
</ion-content>
