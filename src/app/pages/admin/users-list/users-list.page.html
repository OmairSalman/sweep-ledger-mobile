<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/admin"></ion-back-button>
    </ion-buttons>
    <ion-title>Users</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  @if(loading())
  {
    <div class="pau-state">
      <ion-spinner name="circular"></ion-spinner>
    </div>
  }
  @else if(errorMsg())
  {
    <div class="pau-state" role="alert">
      <div class="pau-state__icon pau-state__icon--danger">
        <ion-icon name="alert-circle-outline" aria-hidden="true"></ion-icon>
      </div>
      <div class="pau-state__text">
        <ion-text color="danger" class="pau-state__title">{{ errorMsg() }}</ion-text>
      </div>
    </div>
  }
  @else
  {
    <ion-list>
      @for(user of usersStore.users(); track user.id)
      {
        <ion-item class="user-row" lines="none">
          <div class="pau-tile" slot="start">
            <ion-icon name="person-outline" aria-hidden="true"></ion-icon>
          </div>
          <ion-label>
            <h2>{{ user.name }}</h2>
            <p>{{ user.username }}</p>
          </ion-label>
        </ion-item>
      }
    </ion-list>
  }
</ion-content>
