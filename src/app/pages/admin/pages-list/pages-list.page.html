<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/admin"></ion-back-button>
    </ion-buttons>
    <ion-title>Pages</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="openPageForm(null)">
        <ion-icon slot="icon-only" name="add"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content>
  @if (loading()) {
    <div class="center-state">
      <ion-spinner name="circular"></ion-spinner>
    </div>
  }
  @else if (errorMsg()) {
    <div class="center-state">
      <ion-text color="danger"><p>{{ errorMsg() }}</p></ion-text>
    </div>
  }
  @else if (pagesStore.pages().length === 0) {
    <div class="center-state">
      <p>No pages defined yet.</p>
    </div>
  }
  @else {
    <ion-list>
      @for (page of pagesStore.pages(); track page.id) {
        <ion-item-sliding>
          <ion-item button (click)="openPageForm(page)">
            <ion-label>
              <h2>{{ page.name }}</h2>
              <p>{{ page.pageKey }}</p>
            </ion-label>
          </ion-item>
          <ion-item-options side="end">
            <ion-item-option color="danger" (click)="confirmDelete(page)">
              Delete
            </ion-item-option>
          </ion-item-options>
        </ion-item-sliding>
      }
    </ion-list>
  }
</ion-content>
