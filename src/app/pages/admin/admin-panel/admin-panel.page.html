<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/tabs/profile"></ion-back-button>
    </ion-buttons>
    <ion-title>Admin Panel</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <div class="admin-shell">
    <ion-list class="admin-menu">
      @if(authStore.can('users','write'))
      {
        <ion-item button detail (click)="openCreateUser()" lines="full">
          <div class="pau-tile" slot="start">
            <ion-icon name="person-add-outline" aria-hidden="true"></ion-icon>
          </div>
          <ion-label>Create user</ion-label>
        </ion-item>
      }
      
      @if(authStore.can('users','read'))
      {
        <ion-item button detail routerLink="/admin/users" lines="full">
          <div class="pau-tile" slot="start">
            <ion-icon name="people-outline" aria-hidden="true"></ion-icon>
          </div>
          <ion-label>Manage users</ion-label>
        </ion-item>
      }

      @if(authStore.can('admin', 'read'))
      {
        <ion-item button detail routerLink="/admin/roles" lines="full">
          <div class="pau-tile" slot="start">
            <ion-icon name="id-card-outline" aria-hidden="true"></ion-icon>
          </div>
          <ion-label>Manage roles</ion-label>
        </ion-item>
      }

      @if(authStore.can('admin', 'read'))
      {
        <ion-item button detail routerLink="/admin/pages" lines="full">
          <div class="pau-tile" slot="start">
            <ion-icon name="documents-outline" aria-hidden="true"></ion-icon>
          </div>
          <ion-label>Manage pages</ion-label>
        </ion-item>
      }

      @if(authStore.can('notifications','write'))
      {
        <ion-item button detail (click)="openCreateNotification()" lines="full">
          <div class="pau-tile" slot="start">
            <ion-icon name="notifications-outline" aria-hidden="true"></ion-icon>
          </div>
          <ion-label>Send a notification to users</ion-label>
        </ion-item>
      }
    </ion-list>
  </div>
</ion-content>
