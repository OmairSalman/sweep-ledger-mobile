<ion-header>
  <ion-toolbar>
    <ion-title>{{ role ? 'Edit role' : 'New role' }}</ion-title>
    <ion-buttons slot="start">
      <ion-button (click)="cancel()">Cancel</ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content>
  <div class="modal-shell">
    <form [formGroup]="form" class="modal-form">
      <div class="pau-field">
        <ion-icon name="id-card-outline" class="field-icon" aria-hidden="true"></ion-icon>
        <input
          class="field-input"
          type="text"
          formControlName="name"
          placeholder="Role name"
          aria-label="Role name" />
      </div>
    </form>

    @if (errorMsg()) {
      <div class="pau-notice pau-notice--error" role="alert">
        <ion-icon name="alert-circle-outline" aria-hidden="true"></ion-icon>
        <ion-text color="danger">
          <p class="error-text">{{ errorMsg() }}</p>
        </ion-text>
      </div>
    }

    <ion-button
      class="pau-cta"
      expand="block"
      [strong]="true"
      (click)="submit()"
      [disabled]="form.invalid || saving()">
      @if (saving()) { <ion-spinner name="circular"></ion-spinner> }
      @else { {{ role ? 'Save changes' : 'Create role' }} }
    </ion-button>
  </div>
</ion-content>
