<ion-header>
  <ion-toolbar>
    <ion-title>{{ page ? 'Edit page' : 'New page' }}</ion-title>
    <ion-buttons slot="start">
      <ion-button (click)="cancel()">Cancel</ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content>
  <div class="modal-shell">
    <form [formGroup]="form" class="modal-form">
      <div class="pau-field">
        <ion-icon name="text-outline" class="field-icon" aria-hidden="true"></ion-icon>
        <input
          class="field-input"
          type="text"
          formControlName="name"
          placeholder="Name"
          aria-label="Name" />
      </div>

      <!-- pageKey is a technical identifier — mono, no autocorrect -->
      <div class="pau-field">
        <ion-icon name="code-slash-outline" class="field-icon" aria-hidden="true"></ion-icon>
        <input
          class="field-input field-input--mono"
          type="text"
          formControlName="pageKey"
          placeholder="Page key (e.g. sweeps)"
          aria-label="Page key"
          autocapitalize="off"
          autocorrect="off"
          spellcheck="false" />
      </div>
    </form>

    @if (errorMsg()) {
      <div class="pau-notice pau-notice--error" role="alert">
        <ion-icon name="alert-circle-outline" aria-hidden="true"></ion-icon>
        <ion-text color="danger">
          <p class="error-text">{{ errorMsg() }}</p>
        </ion-text>
      </div>
    }

    <ion-button
      class="pau-cta"
      expand="block"
      [strong]="true"
      (click)="submit()"
      [disabled]="form.invalid || saving()">
      @if (saving()) { <ion-spinner name="circular"></ion-spinner> }
      @else { {{ page ? 'Save changes' : 'Create page' }} }
    </ion-button>
  </div>
</ion-content>
