<ion-header>
  <ion-toolbar>
    @if (authStore.activeRole() !== null) {
      <ion-buttons slot="start">
        <ion-back-button defaultHref="/tabs/profile"></ion-back-button>
      </ion-buttons>
    }
    <ion-title>Select a role</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <p class="picker-hint">Choose which role to use for this session.</p>
  <ion-list class="picker-card">
    @for (role of authStore.availableRoles(); track role.id) {
      <ion-item button detail="false" lines="full" (click)="pick(role)"
                [attr.aria-pressed]="authStore.activeRole()?.id === role.id">
        <div class="pau-tile" slot="start">
          <ion-icon name="id-card-outline" aria-hidden="true"></ion-icon>
        </div>
        <ion-label>{{ role.name }}</ion-label>
        @if (applying() === role.id)
        {
          <ion-spinner slot="end" name="circular"></ion-spinner>
        }
        @else if (authStore.activeRole()?.id === role.id)
        {
          <ion-icon slot="end" class="picker-check" name="checkmark-outline" aria-hidden="true"></ion-icon>
        }
      </ion-item>
    }
  </ion-list>
</ion-content>
