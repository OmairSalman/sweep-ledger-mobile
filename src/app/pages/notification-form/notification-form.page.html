<ion-header>
  <ion-toolbar>
    <ion-title>Broadcast notification</ion-title>
    <ion-buttons slot="start">
      <ion-button (click)="cancel()">Cancel</ion-button>
    </ion-buttons>
    <ion-buttons slot="end">
      <ion-button [strong]="true" (click)="submit()" [disabled]="form.invalid || saving()">
        @if (saving()) { <ion-spinner name="circular"></ion-spinner> }
        @else { Send }
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content>
  <form [formGroup]="form">
    <ion-list>
      <ion-item>
        <ion-input
          label="Title"
          labelPlacement="floating"
          formControlName="title">
        </ion-input>
      </ion-item>
      <ion-item>
        <ion-textarea
          label="Body"
          labelPlacement="floating"
          formControlName="body">
        </ion-textarea>
      </ion-item>
    </ion-list>
  </form>

  @if (errorMsg()) {
    <ion-text color="danger">
      <p class="error-text">{{ errorMsg() }}</p>
    </ion-text>
  }
</ion-content>
